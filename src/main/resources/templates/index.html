<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CRUD Usuarios</title>
</head>
<body>

    <header th:replace="~{plantillas/partes :: cabecero}"></header>
    
    <form th:action="@{/logout}" method="post">
        <input type="submit" value="CERRAR SESIÓN"/>
    </form>

    <h2>PAGINA DE INICIO</h2>
    <a th:href="@{/agregar}">AGREGAR USUARIO</a>
    <h4>LISTA DE USUARIOS</h4>
    <hr>
    <div th:if="${usuarios != null and !usuarios.empty}">
        <table border="1">
            <tr>
                <th>ID</th>
                <th>NOMBRE</th>
                <th>EMAIL</th>
                <th>TELEFONO</th>
                <th>CIUDAD</th>
                <th>ACCIONES</th>
            </tr>
            <tr th:each="u: ${usuarios}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.nombre}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.telefono}"></td>
                <td th:text="${u.ciudad}"></td>
                <td>
                    <a th:href="@{/editar(id=${u.id})}">EDITAR</a>
                    &nbsp;
                    <a th:href="@{/eliminar(id=${u.id})}">ELIMINAR</a>
                </td>
            </tr>
        </table>
    </div>
    <div th:if="${usuarios == null or usuarios.empty}">
        La lista de Usuarios esta Vacía
    </div>

    <footer th:replace="~{plantillas/partes :: pie}"></footer>

</body>
</html>
